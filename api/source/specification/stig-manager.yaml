openapi: 3.0.1
info:
  title: STIG Manager API
  description: An API for managing evaluations of Security Technical Implementation
    Guide (STIG) assessments.
  contact:
    name: STIG Manager OSS Project
    url: https://github.com/NUWCDIVNPT/stig-manager
  version: v1
servers:
- url: http://localhost:64001/api
paths:
  /jobs:
    get:
      summary: List jobs
      tags:
      - Job
      operationId: getJobs
      parameters:
      - $ref: '#/components/parameters/ElevateQuery'
      responses:
        '200':
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Job'
        default:
          description: error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:op:read
      x-elevation-required: true
    post:
      summary: Create a new job
      tags:
      - Job
      operationId: postJob
      parameters:
      - $ref: '#/components/parameters/ElevateQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobCreate'
      responses:
        '201':
          description: Job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        default:
          description: error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:op
      x-elevation-required: true
  /jobs/{jobId}:
    get:
      summary: Get job by ID
      tags:
      - Job
      operationId: getJob
      parameters:
      - $ref: '#/components/parameters/ElevateQuery'
      - $ref: '#/components/parameters/JobIdPath'
      responses:
        '200':
          description: Job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        default:
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:op:read
      x-elevation-required: true
    delete:
      summary: Delete job by ID
      tags:
      - Job
      operationId: deleteJob
      parameters:
      - $ref: '#/components/parameters/ElevateQuery'
      - $ref: '#/components/parameters/JobIdPath'
      responses:
        '204':
          description: Job deleted
        default:
          description: error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:op
      x-elevation-required: true
    patch:
      summary: Update job by ID
      tags:
      - Job
      operationId: patchJob
      parameters:
      - $ref: '#/components/parameters/ElevateQuery'
      - $ref: '#/components/parameters/JobIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobUpdate'
      responses:
        '200':
          description: Job updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        default:
          description: error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:op
      x-elevation-required: true
  /jobs/{jobId}/runs:
    get:
      summary: List the job runs
      tags:
      - Job
      operationId: getRunsByJob
      parameters:
      - $ref: '#/components/parameters/ElevateQuery'
      - $ref: '#/components/parameters/JobIdPath'
      responses:
        '200':
          description: List of job runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobRun'
        default:
          description: error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:op:read
      x-elevation-required: true
    post:
      summary: Start an immediate job run
      tags:
      - Job
      operationId: runImmediateJob
      parameters:
      - $ref: '#/components/parameters/ElevateQuery'
      - $ref: '#/components/parameters/JobIdPath'
      responses:
        '201':
          description: Job run created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobRunCreated'
        default:
          description: error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:op
      x-elevation-required: true
  /jobs/runs/{runId}:
    get:
      summary: Get a job run by ID
      tags:
      - Job
      operationId: getRunById
      parameters:
      - $ref: '#/components/parameters/ElevateQuery'
      - $ref: '#/components/parameters/JobRunIdPath'
      responses:
        '200':
          description: Job run details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobRun'
        default:
          description: error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:op:read
      x-elevation-required: true
    delete:
      summary: Delete a job run by ID
      tags:
      - Job
      operationId: deleteRunById
      parameters:
      - $ref: '#/components/parameters/ElevateQuery'
      - $ref: '#/components/parameters/JobRunIdPath'
      responses:
        '204':
          description: Job run deleted
        default:
          description: error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:op
      x-elevation-required: true
  /jobs/runs/{runId}/output:
    get:
      summary: Get the output for a job run
      tags:
      - Job
      operationId: getOutputByRun
      parameters:
      - $ref: '#/components/parameters/ElevateQuery'
      - $ref: '#/components/parameters/JobRunIdPath'
      - $ref: '#/components/parameters/RunSequenceQuery'
      responses:
        '200':
          description: Job run output
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobRunOutput'
        default:
          description: error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:op:read
      x-elevation-required: true
  /jobs/tasks:
    get:
      summary: List all tasks
      tags:
      - Job
      operationId: getAllTasks
      parameters:
      - $ref: '#/components/parameters/ElevateQuery'
      responses:
        '200':
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobTask'
        default:
          description: error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:op:read
      x-elevation-required: true
  /op/appdata:
    get:
      tags:
      - Operation
      summary: Export application data
      operationId: getAppData
      parameters:
      - $ref: '#/components/parameters/AppDataFormatQuery'
      - $ref: '#/components/parameters/ElevateQuery'
      responses:
        '200':
          description: Exported data
          content:
            application/jsonl:
              schema:
                type: string
            application/gzip:
              schema:
                type: string
                format: binary
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:op:read
    post:
      tags:
      - Operation
      summary: Import and overwrite application data
      operationId: replaceAppData
      parameters:
      - $ref: '#/components/parameters/ElevateQuery'
      requestBody:
        required: false
        content:
          application/gzip:
            schema:
              type: string
              format: binary
          application/x-gzip:
            schema:
              type: string
              format: binary
          application/jsonl:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Import successful
          content:
            application/jsonl:
              schema:
                type: string
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:op
  /op/appdata/tables:
    get:
      tags:
      - Operation
      summary: Get the name and data length of each table
      operationId: getAppDataTables
      parameters:
      - $ref: '#/components/parameters/ElevateQuery'
      responses:
        '200':
          description: An array of table names and lengths
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppDataTable'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:op:read
  /op/appinfo:
    get:
      tags:
      - Operation
      summary: Return information about the application deployment
      operationId: getAppInfo
      parameters:
      - $ref: '#/components/parameters/ElevateQuery'
      - name: includeRowCounts
        in: query
        description: Include exact row counts for each table (slower) or use estimated
          counts (faster)
        schema:
          type: boolean
          default: false
      responses:
        '200':
          description: AppInfo response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppInfo'
      security:
      - oauth:
        - vg:op:read
  /op/configuration:
    get:
      tags:
      - Operation
      summary: Return API version and configuration information
      operationId: getConfiguration
      security: []
      responses:
        '200':
          description: Configuration response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiConfiguration'
  /op/definition:
    get:
      tags:
      - Operation
      summary: Return the API definition
      operationId: getDefinition
      security: []
      parameters:
      - $ref: '#/components/parameters/JsonPathQuery'
      responses:
        '200':
          description: Definition response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefinition'
  /op/details:
    get:
      tags:
      - Operation
      summary: 'DEPRECATED: replaced by /op/appinfo'
      operationId: getDetails
      parameters:
      - $ref: '#/components/parameters/ElevateQuery'
      responses:
        '200':
          description: Detail response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Detail'
      security:
      - oauth:
        - vg:op:read
  /op/state:
    get:
      tags:
      - Operation
      summary: Return information about the API state
      operationId: getState
      responses:
        '200':
          description: Detail response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StateResponse'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /op/state/sse:
    get:
      tags:
      - Operation
      operationId: streamStateSse
      summary: Stream Server-Sent Events (SSE) about changes to the current API state
      description: 'Opens a one-way stream using SSE. The response is a continuous
        stream of events in `text/event-stream` format.

        '
      responses:
        '200':
          description: Stream of events
          content:
            text/event-stream:
              schema:
                type: string
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /user:
    parameters:
    - $ref: '#/components/parameters/UserPreferenceQuery'
    get:
      tags:
      - User
      summary: Return the requester's user information
      operationId: getUser
      responses:
        '200':
          description: User response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProjected'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:user:read
  /user/web-preferences:
    get:
      tags:
      - User
      summary: Return the requester's web-preferences
      operationId: getUserWebPreferences
      responses:
        '200':
          description: User Web Preferences response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebPreferences'
      security:
      - oauth:
        - vg:user:read
    patch:
      tags:
      - User
      summary: Merge the provided object to the requester's web-preferences
      operationId: patchUserWebPreferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebPreferencesPatch'
      responses:
        '200':
          description: User Web Preferences response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebPreferences'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:user:read
  /users:
    parameters:
    - $ref: '#/components/parameters/ElevateQuery'
    - $ref: '#/components/parameters/UserProjectionQuery'
    get:
      tags:
      - User
      summary: Return a list of Users accessible to the requester
      operationId: getUsers
      parameters:
      - $ref: '#/components/parameters/UsernameQuery'
      - $ref: '#/components/parameters/PrivilegeQuery'
      - $ref: '#/components/parameters/UsernameMatchQuery'
      - $ref: '#/components/parameters/UserStatusQuery'
      responses:
        '200':
          description: UserProjected array response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserProjected'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:user:read
    post:
      tags:
      - User
      summary: Create a User
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPost'
      responses:
        '201':
          description: UserProjected response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProjected'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:user
  /users/{userId}:
    parameters:
    - $ref: '#/components/parameters/ElevateQuery'
    - $ref: '#/components/parameters/UserProjectionQuery'
    - $ref: '#/components/parameters/UserIdPath'
    get:
      tags:
      - User
      summary: Return a User
      operationId: getUserByUserId
      responses:
        '200':
          description: UserProjected response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProjected'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:user:read
    patch:
      tags:
      - User
      summary: Merge provided properties with a User
      operationId: updateUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPatch'
      responses:
        '200':
          description: UserProjected response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProjected'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:user
    put:
      tags:
      - User
      summary: Set all properties of a User
      operationId: replaceUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPut'
      responses:
        '200':
          description: UserProjected response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProjected'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:user
    delete:
      tags:
      - User
      summary: Delete a User that has never accessed the system.
      operationId: deleteUser
      responses:
        '200':
          description: UserProjected response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProjected'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:user
  /user-groups:
    post:
      tags:
      - User
      summary: Create a User Group
      operationId: createUserGroup
      parameters:
      - $ref: '#/components/parameters/ElevateQuery'
      - $ref: '#/components/parameters/UserGroupProjectionQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserGroupPostOrPut'
      responses:
        '201':
          description: UserGroup response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserGroupProjected'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:user
    get:
      tags:
      - User
      summary: Get a list of User Groups accessible to the requester
      operationId: getUserGroups
      parameters:
      - $ref: '#/components/parameters/ElevateQuery'
      - $ref: '#/components/parameters/UserGroupProjectionQuery'
      responses:
        '200':
          description: UserGroups response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserGroupProjected'
      security:
      - oauth:
        - vg:user:read
  /user-groups/{userGroupId}:
    get:
      tags:
      - User
      summary: Return a User Group
      operationId: getUserGroup
      parameters:
      - $ref: '#/components/parameters/ElevateQuery'
      - $ref: '#/components/parameters/UserGroupIdPath'
      - $ref: '#/components/parameters/UserGroupProjectionQuery'
      responses:
        '200':
          description: UserGroup response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserGroupProjected'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:user:read
    patch:
      tags:
      - User
      summary: Patch a User Group
      operationId: patchUserGroup
      parameters:
      - $ref: '#/components/parameters/UserGroupIdPath'
      - $ref: '#/components/parameters/ElevateQuery'
      - $ref: '#/components/parameters/UserGroupProjectionQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserGroupPatch'
      responses:
        '200':
          description: UserGroup response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserGroupProjected'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:user
    put:
      tags:
      - User
      summary: Replace a User Group
      operationId: putUserGroup
      parameters:
      - $ref: '#/components/parameters/UserGroupIdPath'
      - $ref: '#/components/parameters/ElevateQuery'
      - $ref: '#/components/parameters/UserGroupProjectionQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserGroupPostOrPut'
      responses:
        '200':
          description: UserGroup response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserGroupProjected'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:user
    delete:
      tags:
      - User
      summary: Delete a User Group
      operationId: deleteUserGroup
      parameters:
      - $ref: '#/components/parameters/UserGroupIdPath'
      - $ref: '#/components/parameters/ElevateQuery'
      - $ref: '#/components/parameters/UserGroupProjectionQuery'
      responses:
        '200':
          description: UserGroup response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserGroupProjected'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:user
components:
  schemas:
    ApiClassification:
      type: string
      enum:
      - NONE
      - U
      - FOUO
      - CUI
      - C
      - S
      - TS
      - SCI
    ApiConfiguration:
      additionalProperties: false
      type: object
      properties:
        classification:
          $ref: '#/components/schemas/ApiClassification'
        commit:
          $ref: '#/components/schemas/CommitObject'
        lastMigration:
          $ref: '#/components/schemas/LastMigration'
        version:
          $ref: '#/components/schemas/ApiVersion'
    ApiDefinition:
      oneOf:
      - type: object
      - type: array
    ApiVersion:
      $ref: '#/components/schemas/Version'
    AppDataFormat:
      type: string
      default: gzip
      enum:
      - jsonl
      - gzip
    AppDataTable:
      type: object
      properties:
        name:
          $ref: '#/components/schemas/String255'
        rows:
          type: number
        dataLength:
          type: number
    AppInfo:
      type: object
      properties:
        date:
          $ref: '#/components/schemas/StringDateTime'
        schema:
          $ref: '#/components/schemas/AppInfoSchemaVersion'
        version:
          $ref: '#/components/schemas/ApiVersion'
        collections:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AppInfoCollection'
        requests:
          $ref: '#/components/schemas/AppInfoRequests'
        users:
          $ref: '#/components/schemas/AppInfoUsers'
        groups:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AppInfoGroups'
        mysql:
          $ref: '#/components/schemas/AppInfoMySql'
        nodejs:
          $ref: '#/components/schemas/AppInfoNodejs'
      required:
      - date
      - schema
      - version
      - collections
      - requests
      - users
      - mysql
      - nodejs
    AppInfoGroups:
      type: object
      properties:
        name:
          $ref: '#/components/schemas/String255'
        members:
          $ref: '#/components/schemas/IntegerMinimumZeroNullable'
        created:
          $ref: '#/components/schemas/Created'
        modifiedDate:
          $ref: '#/components/schemas/StringDateTime'
        roles:
          $ref: '#/components/schemas/AppInfoGroupsRoles'
      required:
      - name
      - members
      - created
      - modifiedDate
      - roles
    AppInfoGroupsRoles:
      type: object
      properties:
        full:
          $ref: '#/components/schemas/IntegerMinimumZeroNullable'
        owner:
          $ref: '#/components/schemas/IntegerMinimumZeroNullable'
        manage:
          $ref: '#/components/schemas/IntegerMinimumZeroNullable'
        restricted:
          $ref: '#/components/schemas/IntegerMinimumZeroNullable'
      required:
      - full
      - owner
      - manage
      - restricted
    AppInfoSchemaVersion:
      type: string
      pattern: ^[a-zA-Z0-9_-]+-appinfo-v[0-9]+\.[0-9]+$
    AppInfoNodejs:
      type: object
      properties:
        version:
          $ref: '#/components/schemas/ApiVersion'
        uptime:
          type: number
          format: double
        os:
          $ref: '#/components/schemas/AppInfoNodeOs'
        environment:
          additionalProperties:
            type: string
        memory:
          $ref: '#/components/schemas/AppInfoNodeMemory'
        cpus:
          type: array
          items:
            $ref: '#/components/schemas/AppInfoNodeCpus'
