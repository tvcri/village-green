              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    label:
                      type: string
                    description:
                      type: string
                    params:
                      type: array
                      items:
                        type: object
        default:
          description: error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:person:read
components:
  schemas:
    ApiClassification:
      type: string
      enum:
      - NONE
      - U
      - FOUO
      - CUI
      - C
      - S
      - TS
      - SCI
    ApiConfiguration:
      additionalProperties: false
      type: object
      properties:
        classification:
          $ref: '#/components/schemas/ApiClassification'
        commit:
          $ref: '#/components/schemas/CommitObject'
        lastMigration:
          $ref: '#/components/schemas/LastMigration'
        version:
          $ref: '#/components/schemas/ApiVersion'
    ApiDefinition:
      oneOf:
      - type: object
      - type: array
    ApiVersion:
      $ref: '#/components/schemas/Version'
    ApplicationExtractResponse:
      type: object
      additionalProperties: true
      required:
      - applicationType
      properties:
        applicationType:
          type: string
          enum: [member, volunteer, unknown]
        usage:
          type: object
          properties:
            inputTokens: { type: integer }
            outputTokens: { type: integer }
            cost: { type: number }
    AppDataFormat:
      type: string
      default: gzip
      enum:
      - jsonl
      - gzip
    AppDataTable:
      type: object
      properties:
        name:
          $ref: '#/components/schemas/String255'
        rows:
          type: number
        dataLength:
          type: number
    Attribution:
      type: object
      properties:
        userId:
          $ref: '#/components/schemas/UserId'
        username:
          $ref: '#/components/schemas/Username'
        ts:
          $ref: '#/components/schemas/StringDateTime'
    Attributions:
      type: object
      properties:
        created:
          $ref: '#/components/schemas/Attribution'
        modified:
          $ref: '#/components/schemas/Attribution'
    CapabilityCounts:
      additionalProperties: false
      type: object
      properties:
        errands:
          type: integer
          minimum: 0
        friends:
          type: integer
          minimum: 0
        rides:
          type: integer
          minimum: 0
        homeHelp:
          type: integer
          minimum: 0
        techSupport:
          type: integer
          minimum: 0
      required:
      - errands
      - friends
      - rides
      - homeHelp
      - techSupport
    CapabilityId:
      $ref: '#/components/schemas/StringIntId'
    CapabilityName:
      $ref: '#/components/schemas/String255'
    Capability:
      additionalProperties: false
      type: object
      required: [ capabilityId, name ]
      properties:
        capabilityId: { $ref: '#/components/schemas/CapabilityId' }
        name: { type: string, maxLength: 100 }
    CommunityId:
      $ref: '#/components/schemas/StringIntId'
    Community:
      additionalProperties: false
      type: object
      required: [ communityId, name ]
      properties:
        communityId: { $ref: '#/components/schemas/CommunityId' }
        name: { type: string, maxLength: 100 }
    DisabilityId:
      $ref: '#/components/schemas/StringIntId'
    Disability:
      additionalProperties: false
      type: object
      required: [ disabilityId, name ]
      properties:
        disabilityId: { $ref: '#/components/schemas/DisabilityId' }
        name: { type: string, maxLength: 100 }
    PersonDisability:
      additionalProperties: false
      type: object
      required: [ disabilityId, name ]
      properties:
        disabilityId: { $ref: '#/components/schemas/DisabilityId' }
        name: { type: string, maxLength: 100 }
        note: { type: string, maxLength: 255, nullable: true }
    PersonDisabilityPatch:
      additionalProperties: false
      type: object
      required: [ disabilityId ]
      properties:
        disabilityId: { $ref: '#/components/schemas/DisabilityId' }
        note: { type: string, maxLength: 255, nullable: true }
    CommitBranch:
      type: string
    CommitDescribe:
      type: string
    CommitObject:
      type: object
      additionalProperties: false
      properties:
        branch:
          $ref: '#/components/schemas/CommitBranch'
        describe:
          $ref: '#/components/schemas/CommitDescribe'
        sha:
          $ref: '#/components/schemas/CommitSha'
        tag:
          $ref: '#/components/schemas/CommitTag'
    CommitSha:
      type: string
    CommitTag:
      type: string
    Created:
      $ref: '#/components/schemas/StringDateTime'
    Dependencies:
      type: object
      properties:
        db:
          type: boolean
        oidc:
          type: boolean
    DisplayName:
      $ref: '#/components/schemas/String255Nullable'
    Endpoints:
      additionalProperties: false
      type: object
      properties:
        ui:
          type: object
          additionalProperties: false
          properties:
            current:
              type: string
            next:
              type: string
    CeDump:
      type: object
      additionalProperties: false
      properties:
        ceDumpTime:
          type: string
          format: date-time
          nullable: true
          description: Current time in ISO 8601 UTC format
    Error:
      type: object
      properties:
        detail:
          oneOf:
          - type: string
          - type: object
        error:
          type: string
        stack:
          type: string
    FcvPerson:
      oneOf:
        - $ref: '#/components/schemas/FcvPersonResolved'
        - $ref: '#/components/schemas/FcvPersonUnresolved'
    FcvPersonResolved:
      additionalProperties: false
      type: object
      required:
        - personId
        - fullName
      properties:
        personId:
          $ref: '#/components/schemas/PersonId'
        fullName:
          type: string
          maxLength: 200
    FcvPersonUnresolved:
      additionalProperties: false
      type: object
      properties:
        rawName:
          type: string
          maxLength: 200
          nullable: true
        fuzzyName:
          type: string
          maxLength: 200
          nullable: true
    FriendSubmission:
      additionalProperties: false
      type: object
      required:
        - friendId
        - visitDate
        - timeSpentMinutes
        - contactType
        - activityTypes
        - activityOther
        - notes
        - submittedAt
        - village
        - volunteer
        - member
      properties:
        friendId:
          type: string
        visitDate:
          type: string
          format: date
        timeSpentMinutes:
          type: integer
        contactType:
          type: string
          maxLength: 50
        activityTypes:
          type: array
          nullable: true
          items:
            type: string
        activityOther:
          type: string
          maxLength: 500
          nullable: true
        notes:
          type: string
          nullable: true
        submittedAt:
          type: string
          format: date-time
        village:
          type: object
          nullable: true
          properties:
            villageId:
              $ref: '#/components/schemas/VillageId'
            name:
              type: string
        volunteer:
          type: object
          nullable: true
          allOf:
            - $ref: '#/components/schemas/FcvPerson'
        member:
          type: object
          nullable: true
          allOf:
            - $ref: '#/components/schemas/FcvPerson'
    GrantId:
      $ref: '#/components/schemas/StringIntId'
    Grantee:
      oneOf:
      - $ref: '#/components/schemas/UserBasic'
      - $ref: '#/components/schemas/UserGroupBasic'
    Grantees:
      type: array
      items:
        $ref: '#/components/schemas/Grantee'
    IntegerMinimumZeroNullable:
      type: integer
      minimum: 0
      nullable: true
    Job:
      additionalProperties: false
      type: object
      properties:
        jobId:
          $ref: '#/components/schemas/JobId'
        name:
          $ref: '#/components/schemas/String45'
        description:
          $ref: '#/components/schemas/String255Nullable'
        createdBy:
          $ref: '#/components/schemas/UserBasicNullable'
        created:
          $ref: '#/components/schemas/StringDateTime'
        updatedBy:
          $ref: '#/components/schemas/UserBasicNullable'
        updated:
          $ref: '#/components/schemas/StringDateTimeNullable'
        tasks:
          $ref: '#/components/schemas/JobTaskList'
        event:
          $ref: '#/components/schemas/JobEvent'
        runCount:
          type: integer
        lastRun:
          $ref: '#/components/schemas/JobRun'
      required:
      - jobId
      - name
      - tasks
      - created
      - createdBy
    JobCreate:
      additionalProperties: false
      type: object
      properties:
        name:
          $ref: '#/components/schemas/String45'
        description:
          $ref: '#/components/schemas/String255Nullable'
        tasks:
          $ref: '#/components/schemas/JobTaskListCreate'
        event:
          $ref: '#/components/schemas/JobEventCreate'
      required:
      - name
      - tasks
    JobEvent:
      oneOf:
      - type: integer
        nullable: true
      - $ref: '#/components/schemas/JobEventRecurring'
      - $ref: '#/components/schemas/JobEventOnce'
    JobEventCreate:
      oneOf:
      - $ref: '#/components/schemas/JobEventRecurringCreate'
