  /mailing-labels:
    get:
      summary: Generate mailing labels for an audience
      tags:
      - MailingLabel
      operationId: getMailingLabels
      parameters:
      - name: audience
        in: query
        required: true
        description: Audience id from /mailing-labels/audiences
        schema:
          type: string
      responses:
        '200':
          description: Label-ready address groups
          content:
            application/json:
              schema:
                type: object
                properties:
                  audience:
                    type: string
                  labels:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        street:
                          type: string
                        unit:
                          type: string
                          nullable: true
                        city:
                          type: string
                          nullable: true
                        state:
                          type: string
                          nullable: true
                        zip:
                          type: string
                          nullable: true
                        sortLastName:
                          type: string
                          nullable: true
                          description: Primary recipient's last name, for client-side sorting
                  summary:
                    type: object
                    properties:
                      recipientCount:
                        type: integer
                      labelCount:
                        type: integer
                      mergedCount:
                        type: integer
                  warnings:
                    type: object
                    properties:
                      unmailable:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            reason:
                              type: string
        default:
          description: error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:person:read
