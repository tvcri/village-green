openapi: 3.0.1
info:
  title: Village Green API
  description: An API for managing a federation of villages.
  contact:
    name: Village Green OSS Project
    url: https://github.com/tvcri/village-green
  version: v1
servers:
- url: http://localhost:64001/api
paths:
  /jobs:
    get:
      summary: List jobs
      tags:
      - Job
      operationId: getJobs
      parameters:
      - $ref: '#/components/parameters/ElevateQuery'
      responses:
        '200':
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Job'
        default:
          description: error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:op:read
      x-elevation-required: true
    post:
      summary: Create a new job
      tags:
      - Job
      operationId: postJob
      parameters:
      - $ref: '#/components/parameters/ElevateQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobCreate'
      responses:
        '201':
          description: Job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        default:
          description: error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:op
      x-elevation-required: true
  /jobs/{jobId}:
    get:
      summary: Get job by ID
      tags:
      - Job
      operationId: getJob
      parameters:
      - $ref: '#/components/parameters/ElevateQuery'
      - $ref: '#/components/parameters/JobIdPath'
      responses:
        '200':
          description: Job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        default:
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:op:read
      x-elevation-required: true
    delete:
      summary: Delete job by ID
      tags:
      - Job
      operationId: deleteJob
      parameters:
      - $ref: '#/components/parameters/ElevateQuery'
      - $ref: '#/components/parameters/JobIdPath'
      responses:
        '204':
          description: Job deleted
        default:
          description: error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:op
      x-elevation-required: true
    patch:
      summary: Update job by ID
      tags:
      - Job
      operationId: patchJob
      parameters:
      - $ref: '#/components/parameters/ElevateQuery'
      - $ref: '#/components/parameters/JobIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobUpdate'
      responses:
        '200':
          description: Job updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        default:
          description: error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:op
      x-elevation-required: true
  /jobs/{jobId}/runs:
    get:
      summary: List the job runs
      tags:
      - Job
      operationId: getRunsByJob
      parameters:
      - $ref: '#/components/parameters/ElevateQuery'
      - $ref: '#/components/parameters/JobIdPath'
      responses:
        '200':
          description: List of job runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobRun'
        default:
          description: error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:op:read
      x-elevation-required: true
    post:
      summary: Start an immediate job run
      tags:
      - Job
      operationId: runImmediateJob
      parameters:
      - $ref: '#/components/parameters/ElevateQuery'
      - $ref: '#/components/parameters/JobIdPath'
      responses:
        '201':
          description: Job run created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobRunCreated'
        default:
          description: error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:op
      x-elevation-required: true
  /jobs/runs/{runId}:
    get:
      summary: Get a job run by ID
      tags:
      - Job
      operationId: getRunById
      parameters:
      - $ref: '#/components/parameters/ElevateQuery'
      - $ref: '#/components/parameters/JobRunIdPath'
      responses:
        '200':
          description: Job run details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobRun'
        default:
          description: error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:op:read
      x-elevation-required: true
    delete:
      summary: Delete a job run by ID
      tags:
      - Job
      operationId: deleteRunById
      parameters:
      - $ref: '#/components/parameters/ElevateQuery'
      - $ref: '#/components/parameters/JobRunIdPath'
      responses:
        '204':
          description: Job run deleted
        default:
          description: error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:op
      x-elevation-required: true
  /jobs/runs/{runId}/output:
    get:
      summary: Get the output for a job run
      tags:
      - Job
      operationId: getOutputByRun
      parameters:
      - $ref: '#/components/parameters/ElevateQuery'
      - $ref: '#/components/parameters/JobRunIdPath'
      - $ref: '#/components/parameters/RunSequenceQuery'
      responses:
        '200':
          description: Job run output
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobRunOutput'
        default:
          description: error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:op:read
      x-elevation-required: true
  /jobs/tasks:
    get:
      summary: List all tasks
      tags:
      - Job
      operationId: getAllTasks
      parameters:
      - $ref: '#/components/parameters/ElevateQuery'
      responses:
        '200':
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobTask'
        default:
          description: error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:op:read
      x-elevation-required: true
  /op/appdata:
    get:
      tags:
      - Operation
      summary: Export application data
      operationId: getAppData
      parameters:
      - $ref: '#/components/parameters/AppDataFormatQuery'
      - $ref: '#/components/parameters/ElevateQuery'
      responses:
        '200':
          description: Exported data
          content:
            application/jsonl:
              schema:
                type: string
            application/gzip:
              schema:
                type: string
                format: binary
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:op:read
    post:
      tags:
      - Operation
      summary: Import and overwrite application data
      operationId: replaceAppData
      parameters:
      - $ref: '#/components/parameters/ElevateQuery'
      requestBody:
        required: false
        content:
          application/gzip:
            schema:
              type: string
              format: binary
          application/x-gzip:
            schema:
              type: string
              format: binary
          application/jsonl:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Import successful
          content:
            application/jsonl:
              schema:
                type: string
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:op
  /op/appdata/tables:
    get:
      tags:
      - Operation
      summary: Get the name and data length of each table
      operationId: getAppDataTables
      parameters:
      - $ref: '#/components/parameters/ElevateQuery'
      responses:
        '200':
          description: An array of table names and lengths
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppDataTable'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:op:read
  /op/configuration:
    get:
      tags:
      - Operation
      summary: Return API version and configuration information
      operationId: getConfiguration
      security: []
      responses:
        '200':
          description: Configuration response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiConfiguration'
  /op/definition:
    get:
      tags:
      - Operation
      summary: Return the API definition
      operationId: getDefinition
      security: []
      parameters:
      - $ref: '#/components/parameters/JsonPathQuery'
      responses:
        '200':
          description: Definition response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefinition'
  /op/state:
    get:
      tags:
      - Operation
      summary: Return information about the API state
      operationId: getState
      responses:
        '200':
          description: Detail response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StateResponse'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /op/state/sse:
    get:
      tags:
      - Operation
      operationId: streamStateSse
      summary: Stream Server-Sent Events (SSE) about changes to the current API state
      description: 'Opens a one-way stream using SSE. The response is a continuous
        stream of events in `text/event-stream` format.

        '
      responses:
        '200':
          description: Stream of events
          content:
            text/event-stream:
              schema:
                type: string
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /op/ce-dump:
    get:
      tags:
      - Operation
      operationId: getCeDump
      summary: Get the time of the most recent CE dump
      description: Returns the time of the most recent CE dump in ISO 8601 UTC format
      responses:
        '200':
          description: Time of the most recent CE dump
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CeDump'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:op:read
  /op/ce-dump-updated:
    post:
      summary: Notify API of CE Dump sync completion
      description: Updates the API with the CE Dump sync completion timestamp from an external sync service
      tags:
      - Operation
      operationId: ceDumpUpdated
      security:
      - webhookBearer: []
      responses:
        '200':
          description: Sync update received
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CeDump'
        '401':
          description: Unauthorized - invalid webhook key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /op/analytics/events:
    post:
      tags:
      - Analytics
      summary: Record analytics events
      operationId: postEvents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/AnalyticsEvent'
              maxItems: 50
      responses:
        '204':
          description: Events recorded
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:read
  /op/analytics/summary:
    get:
      tags:
      - Analytics
      summary: Get analytics summary (admin only)
      operationId: getSummary
      parameters:
      - $ref: '#/components/parameters/ElevateQuery'
      - name: from
        in: query
        required: false
        schema:
          type: string
          format: date-time
      - name: to
        in: query
        required: false
        schema:
          type: string
          format: date-time
      - name: userId
        in: query
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Analytics summary rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AnalyticsSummaryRow'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:read
      x-elevation-required: true
  /op/roles:
    get:
      summary: List roles and their permissions
      tags: [Operation]
      operationId: getRoles
      responses:
        '200':
          description: Role list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Role' }
      security:
      - oauth:
        - vg:op:read
  /user:
    parameters:
    - $ref: '#/components/parameters/UserPreferenceQuery'
    get:
      tags:
      - User
      summary: Return the requester's user information
      operationId: getUser
      responses:
        '200':
          description: User response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProjected'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:user:read
  /user/web-preferences:
    get:
      tags:
      - User
      summary: Return the requester's web-preferences
      operationId: getUserWebPreferences
      responses:
        '200':
          description: User Web Preferences response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebPreferences'
      security:
      - oauth:
        - vg:user:read
    patch:
      tags:
      - User
      summary: Merge the provided object to the requester's web-preferences
      operationId: patchUserWebPreferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebPreferencesPatch'
      responses:
        '200':
          description: User Web Preferences response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebPreferences'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:user:read
  /privacy/rules:
    get:
      tags:
      - Privacy
      summary: Return the current published privacy rules
      operationId: getPrivacyRules
      responses:
        '200':
          description: Current privacy rules
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivacyRules'
        '404':
          description: No rules published yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:user:read
    post:
      tags:
      - Privacy
      summary: Publish a new version of privacy rules
      operationId: publishPrivacyRules
      parameters:
      - $ref: '#/components/parameters/ElevateQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrivacyRulesPost'
      responses:
        '201':
          description: New privacy rules version published
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivacyRules'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:user:read
      x-elevation-required: true
  /privacy/rules/current:
    patch:
      tags:
      - Privacy
      summary: Correct the current published privacy rules without creating a new version
      operationId: patchPrivacyRulesCurrent
      parameters:
      - $ref: '#/components/parameters/ElevateQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrivacyRulesPatch'
      responses:
        '200':
          description: Privacy rules corrected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivacyRules'
        '404':
          description: No rules published yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:user:read
      x-elevation-required: true
  /privacy/acknowledgements:
    post:
      tags:
      - Privacy
      summary: Record the current user's acknowledgement of the privacy rules
      operationId: createPrivacyAcknowledgement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrivacyAcknowledgementPost'
      responses:
        '201':
          description: Acknowledgement recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivacyAcknowledgement'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:user:read
  /enrollment/request:
    post:
      tags:
      - Enrollment
      summary: Request an enrollment PIN for a registered volunteer email
      description: >-
        Public endpoint. Always returns the identical response regardless of
        whether the email is registered, holds which roles, or already has an
        account (enumeration defense). Truthful branching happens only after
        PIN verification.
      operationId: requestEnrollment
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
              - email
              properties:
                email:
                  type: string
                  minLength: 3
                  maxLength: 200
      responses:
        '200':
          description: >-
            Uniform empty acknowledgement (enumeration defense). Carries no
            outcome and no display text - the acknowledgement shown to the user
            is client-owned copy.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
  /enrollment/verify:
    post:
      tags:
      - Enrollment
      summary: Verify an emailed PIN; create the account or report it exists
      operationId: verifyEnrollment
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
              - email
              - pin
              properties:
                email:
                  type: string
                  minLength: 3
                  maxLength: 200
                pin:
                  type: string
                  pattern: '^[0-9]{6}$'
      responses:
        '200':
          description: PIN accepted; truthful account state
          content:
            application/json:
              schema:
                type: object
                required:
                - status
                - loginUrl
                properties:
                  status:
                    type: string
                    enum:
                    - created
                    - exists
                  tempPassword:
                    type: string
                  loginUrl:
                    type: string
        '400':
          description: Invalid, expired, consumed, or attempt-capped PIN
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                    - invalid
  /enrollment/reset-password:
    post:
      tags:
      - Enrollment
      summary: Re-issue a temporary password to a PIN-verified existing account
      description: >-
        Gated by the just-consumed enrollment row: requires the same email and
        PIN that passed /enrollment/verify within the last 10 minutes, once.
      operationId: resetEnrollmentPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
              - email
              - pin
              properties:
                email:
                  type: string
                  minLength: 3
                  maxLength: 200
                pin:
                  type: string
                  pattern: '^[0-9]{6}$'
      responses:
        '200':
          description: New temporary password issued
          content:
            application/json:
              schema:
                type: object
                required:
                - status
                - tempPassword
                - loginUrl
                properties:
                  status:
                    type: string
                    enum:
                    - reset
                  tempPassword:
                    type: string
                  loginUrl:
                    type: string
        '400':
          description: No eligible consumed row or PIN mismatch
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                    - invalid
  /users:
    parameters:
    - $ref: '#/components/parameters/ElevateQuery'
    - $ref: '#/components/parameters/UserProjectionQuery'
    get:
      tags:
      - User
      summary: Return a list of Users accessible to the requester
      operationId: getUsers
      parameters:
      - $ref: '#/components/parameters/UsernameQuery'
      - $ref: '#/components/parameters/UsernameMatchQuery'
      - $ref: '#/components/parameters/UserStatusQuery'
      responses:
        '200':
          description: UserProjected array response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserProjected'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:user:read
    post:
      tags:
      - User
      summary: Create a User
      operationId: createUser
      parameters:
      - name: keycloak
        in: query
        description: Also create the corresponding Keycloak account. Defaults to true.
        schema:
          type: boolean
          default: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPost'
      responses:
        '201':
          description: UserProjected response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProjected'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:user
  /users/{userId}:
    parameters:
    - $ref: '#/components/parameters/ElevateQuery'
    - $ref: '#/components/parameters/UserProjectionQuery'
    - $ref: '#/components/parameters/UserIdPath'
    get:
      tags:
      - User
      summary: Return a User
      operationId: getUserByUserId
      responses:
        '200':
          description: UserProjected response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProjected'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:user:read
    patch:
      tags:
      - User
      summary: Merge provided properties with a User
      operationId: updateUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPatch'
      responses:
        '200':
          description: UserProjected response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProjected'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:user
    put:
      tags:
      - User
