            format: date
        - name: dateEnd
          in: query
          description: Filter visits on or before this date (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: contactType
          in: query
          description: Filter by contact type (exact match)
          schema:
            type: string
        - name: activityType
          in: query
          description: Filter by activity type (must be present in activityTypes array)
          schema:
            type: string
        - name: volunteerName
          in: query
          description: Filter by volunteer name (partial match against resolved and raw name)
          schema:
            type: string
        - name: memberName
          in: query
          description: Filter by member name (partial match against resolved and raw name)
          schema:
            type: string
      responses:
        '200':
          description: List of FCV submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FriendSubmission'
        default:
