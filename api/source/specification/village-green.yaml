components:
  schemas:
    ApiClassification:
      type: string
      enum:
      - NONE
      - U
      - FOUO
      - CUI
      - C
      - S
      - TS
      - SCI
    ApiConfiguration:
      additionalProperties: false
      type: object
      properties:
        classification:
          $ref: '#/components/schemas/ApiClassification'
        commit:
          $ref: '#/components/schemas/CommitObject'
        lastMigration:
          $ref: '#/components/schemas/LastMigration'
        version:
          $ref: '#/components/schemas/ApiVersion'
    ApiDefinition:
      oneOf:
      - type: object
      - type: array
    ApiVersion:
      $ref: '#/components/schemas/Version'
    AppDataFormat:
      type: string
      default: gzip
      enum:
      - jsonl
      - gzip
    AppDataTable:
      type: object
      properties:
        name:
          $ref: '#/components/schemas/String255'
        rows:
          type: number
        dataLength:
          type: number
    Attribution:
      type: object
      properties:
        userId:
          $ref: '#/components/schemas/UserId'
        username:
          $ref: '#/components/schemas/Username'
        ts:
          $ref: '#/components/schemas/StringDateTime'
    Attributions:
      type: object
      properties:
        created:
          $ref: '#/components/schemas/Attribution'
        modified:
          $ref: '#/components/schemas/Attribution'
    CapabilityCounts:
      additionalProperties: false
      type: object
      properties:
        errands:
          type: integer
          minimum: 0
        rides:
          type: integer
          minimum: 0
        homeHelp:
          type: integer
          minimum: 0
        techSupport:
          type: integer
          minimum: 0
      required:
      - errands
      - rides
      - homeHelp
      - techSupport
    CapabilityId:
      $ref: '#/components/schemas/StringIntId'
    CommitBranch:
      type: string
    CommitDescribe:
      type: string
    CommitObject:
      type: object
      additionalProperties: false
      properties:
        branch:
          $ref: '#/components/schemas/CommitBranch'
        describe:
          $ref: '#/components/schemas/CommitDescribe'
        sha:
          $ref: '#/components/schemas/CommitSha'
        tag:
          $ref: '#/components/schemas/CommitTag'
    CommitSha:
      type: string
    CommitTag:
      type: string
    Created:
      $ref: '#/components/schemas/StringDateTime'
    Dependencies:
      type: object
      properties:
        db:
          type: boolean
        oidc:
          type: boolean
    DisplayName:
      $ref: '#/components/schemas/String255Nullable'
    Endpoints:
      additionalProperties: false
      type: object
      properties:
        ui:
          type: string
    Error:
      type: object
      properties:
        detail:
          type: string
        error:
          type: string
        stack:
          type: string
    Grantee:
      oneOf:
      - $ref: '#/components/schemas/UserBasic'
      - $ref: '#/components/schemas/UserGroupBasic'
    Grantees:
      type: array
      items:
        $ref: '#/components/schemas/Grantee'
    IntegerMinimumZeroNullable:
      type: integer
      minimum: 0
      nullable: true
    Job:
      additionalProperties: false
      type: object
      properties:
        jobId:
          $ref: '#/components/schemas/JobId'
        name:
          $ref: '#/components/schemas/String45'
        description:
          $ref: '#/components/schemas/String255Nullable'
        createdBy:
          $ref: '#/components/schemas/UserBasicNullable'
        created:
          $ref: '#/components/schemas/StringDateTime'
        updatedBy:
          $ref: '#/components/schemas/UserBasicNullable'
        updated:
          $ref: '#/components/schemas/StringDateTimeNullable'
        tasks:
          $ref: '#/components/schemas/JobTaskList'
        event:
          $ref: '#/components/schemas/JobEvent'
        runCount:
          type: integer
        lastRun:
          $ref: '#/components/schemas/JobRun'
      required:
      - jobId
      - name
      - tasks
      - created
      - createdBy
    JobCreate:
      additionalProperties: false
      type: object
      properties:
        name:
          $ref: '#/components/schemas/String45'
        description:
          $ref: '#/components/schemas/String255Nullable'
        tasks:
          $ref: '#/components/schemas/JobTaskListCreate'
        event:
          $ref: '#/components/schemas/JobEventCreate'
      required:
      - name
      - tasks
    JobEvent:
      oneOf:
      - type: integer
        nullable: true
      - $ref: '#/components/schemas/JobEventRecurring'
      - $ref: '#/components/schemas/JobEventOnce'
    JobEventCreate:
      oneOf:
      - $ref: '#/components/schemas/JobEventRecurringCreate'
      - $ref: '#/components/schemas/JobEventOnceCreate'
      - type: integer
        nullable: true
    JobEventOnce:
      additionalProperties: false
      type: object
      properties:
        eventId:
          $ref: '#/components/schemas/String45'
        type:
          type: string
          enum:
          - once
        starts:
          $ref: '#/components/schemas/StringDateTime'
        enabled:
          type: boolean
          default: true
      required:
      - eventId
      - starts
      - type
    JobEventOnceCreate:
      additionalProperties: false
      type: object
      properties:
        type:
          type: string
          enum:
          - once
        starts:
          $ref: '#/components/schemas/StringDateTime'
      required:
      - starts
      - type
    JobEventRecurring:
      additionalProperties: false
      type: object
      properties:
        eventId:
          $ref: '#/components/schemas/String45'
        type:
          type: string
          enum:
          - recurring
        interval:
          $ref: '#/components/schemas/JobInterval'
        starts:
          $ref: '#/components/schemas/StringDateTimeNullable'
        ends:
          $ref: '#/components/schemas/StringDateTimeNullable'
        enabled:
          type: boolean
          default: true
      required:
      - eventId
      - type
      - interval
    JobEventRecurringCreate:
      additionalProperties: false
      type: object
      properties:
        type:
          type: string
          enum:
          - recurring
        interval:
          $ref: '#/components/schemas/JobInterval'
        starts:
          $ref: '#/components/schemas/StringDateTimeNullable'
        ends:
          $ref: '#/components/schemas/StringDateTimeNullable'
        enabled:
          type: boolean
          default: true
      required:
      - type
      - interval
    JobId:
      $ref: '#/components/schemas/StringIntId'
    JobInterval:
      additionalProperties: false
      type: object
      properties:
        value:
          type: string
        field:
          type: string
          enum:
          - minute
          - hour
          - day
          - week
          - month
      required:
      - value
      - field
    JobRun:
      additionalProperties: false
      nullable: true
      type: object
      properties:
        runId:
          $ref: '#/components/schemas/JobRunId'
        created:
          $ref: '#/components/schemas/StringDateTime'
        updated:
          $ref: '#/components/schemas/StringDateTimeNullable'
        state:
          $ref: '#/components/schemas/JobRunState'
        jobId:
          $ref: '#/components/schemas/JobId'
      required:
      - runId
      - created
      - state
    JobRunCreated:
      additionalProperties: false
      type: object
      properties:
        runId:
          $ref: '#/components/schemas/JobRunId'
      required:
      - runId
    JobRunId:
      $ref: '#/components/schemas/StringUuid'
    JobRunOutput:
      additionalProperties: false
      type: object
      properties:
        type:
          type: string
        message:
          type: string
        task:
          $ref: '#/components/schemas/String45'
        taskId:
          $ref: '#/components/schemas/JobTaskId'
        ts:
          $ref: '#/components/schemas/StringDateTime'
      required:
      - message
      - type
      - task
      - ts
    JobRunState:
      type: string
      nullable: true
      enum:
      - running
      - completed
      - failed
    JobTask:
      type: object
      additionalProperties: false
      properties:
        taskId:
          $ref: '#/components/schemas/StringIntId'
        name:
          $ref: '#/components/schemas/String45'
        description:
          $ref: '#/components/schemas/String255Nullable'
        command:
          $ref: '#/components/schemas/String255'
      required:
      - taskId
      - name
    JobTaskId:
      $ref: '#/components/schemas/StringIntId'
    JobTaskList:
      type: array
      minItems: 1
      items:
        $ref: '#/components/schemas/JobTask'
    JobTaskListCreate:
      type: array
      minItems: 1
      items:
        $ref: '#/components/schemas/JobTaskId'
    JobUpdate:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          $ref: '#/components/schemas/String45'
        description:
          $ref: '#/components/schemas/String255Nullable'
        tasks:
          $ref: '#/components/schemas/JobTaskListCreate'
        event:
          $ref: '#/components/schemas/JobEventCreate'
    LastMigration:
      type: integer
      minimum: 0
    Member:
      additionalProperties: false
      type: object
      required:
      - memberId
      - personId
      properties:
        memberId:
          $ref: '#/components/schemas/MemberId'
        personId:
          $ref: '#/components/schemas/PersonId'
        fullName:
          type: string
          maxLength: 200
        memberNumber:
          type: string
          maxLength: 50
          nullable: true
        memberLevel:
          type: string
          maxLength: 100
          nullable: true
        serviceNotes:
          type: string
          nullable: true
        joinDate:
          type: string
          format: date
    MemberId:
      $ref: '#/components/schemas/StringIntId'
    MemberPatch:
      additionalProperties: false
      type: object
      minProperties: 1
      properties:
        memberNumber:
          type: string
          maxLength: 50
          nullable: true
        memberLevel:
          type: string
          maxLength: 100
          nullable: true
        serviceNotes:
          type: string
          nullable: true
        joinDate:
          type: string
          format: date
    MemberPost:
      additionalProperties: false
      type: object
      required:
      - personId
      properties:
        personId:
          $ref: '#/components/schemas/PersonId'
        memberNumber:
          type: string
          maxLength: 50
        memberLevel:
          type: string
          maxLength: 100
        serviceNotes:
          type: string
        joinDate:
          type: string
          format: date
    Person:
      additionalProperties: false
      type: object
      required:
      - personId
      - fullName
      properties:
        personId:
          $ref: '#/components/schemas/PersonId'
        fullName:
          type: string
          maxLength: 200
        lastName:
          type: string
          maxLength: 100
          nullable: true
        firstName:
          type: string
          maxLength: 100
          nullable: true
        nickname:
          type: string
          maxLength: 100
          nullable: true
        address:
          type: string
          maxLength: 300
          nullable: true
