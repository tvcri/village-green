  /oauth/token:
    post:
      summary: Exchange authorization code for Google OAuth tokens
      tags:
      - OAuth
      operationId: postOAuthToken
      parameters:
      - name: code
        in: query
        description: Authorization code from Google OAuth
        required: true
        schema:
          type: string
      - name: code_verifier
        in: query
        description: PKCE code verifier (optional)
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Tokens returned from Google
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    description: Google OAuth access token
                  refresh_token:
                    type: string
                    description: Google OAuth refresh token
                  expires_in:
                    type: integer
                    description: Seconds until token expires
                  token_type:
                    type: string
                    description: Token type (usually "Bearer")
                required:
                - access_token
                - expires_in
                - token_type
        '400':
          description: Bad request (missing code, etc)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security: []
  /applications/extract:
    post:
      summary: Extract application data from a scanned PDF
      tags:
      - Application
      operationId: extractApplication
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                importFile:
                  type: string
                  format: binary
      responses:
        '200':
          description: Extraction result, discriminated by applicationType
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationExtractResponse'
        '400':
          description: Missing or invalid file, or extraction was declined
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '502':
          description: Anthropic API error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        default:
          description: error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - oauth:
        - vg:person
